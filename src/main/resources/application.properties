# ============================================================
# Namma Metro — Application Configuration
# ============================================================

# Application name
spring.application.name=NammaMetro

# ------------------------------------------------------------
# MySQL DataSource Configuration
# The connection properties are also managed by the Singleton
# DatabaseManager class (see com.nammametro.pattern.DatabaseManager).
# Spring Boot uses these properties directly for the DataSource.
# ------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/namma_metro?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sacpes123$
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------
# SQL Initialization — runs schema.sql on startup
# ------------------------------------------------------------
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# ------------------------------------------------------------
# Thymeleaf
# ------------------------------------------------------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ------------------------------------------------------------
# Server
# ------------------------------------------------------------
server.port=8080

# ------------------------------------------------------------
# JWT Configuration
# ------------------------------------------------------------
jwt.secret=NammaMetroSuperSecretKeyForJWTTokenGeneration2026!@#$%^&*()
jwt.expiration=86400000
