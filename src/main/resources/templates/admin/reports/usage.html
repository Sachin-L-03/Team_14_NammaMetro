<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usage Report — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(124,58,237,.2)}
        .bar a{color:#A78BFA;text-decoration:none;font-weight:600;font-size:.9rem}
        .bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:1000px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:1.5rem}
        .filter-card{background:#1A1A2E;border:1px solid rgba(124,58,237,.15);border-radius:14px;padding:1.5rem;margin-bottom:2rem}
        .filter-row{display:flex;gap:1rem;align-items:end;flex-wrap:wrap}
        .form-group{flex:1;min-width:140px}
        .form-label{display:block;font-size:.8rem;font-weight:500;color:#94A3B8;margin-bottom:.3rem}
        .form-input{width:100%;padding:.6rem .85rem;background:rgba(15,15,26,.6);border:1px solid rgba(124,58,237,.2);border-radius:8px;color:#E2E8F0;font-size:.85rem;font-family:'Inter',sans-serif;outline:none}
        .form-input:focus{border-color:#7C3AED}
        .btn-filter{padding:.6rem 1.5rem;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
        .btn-filter:hover{transform:translateY(-1px);box-shadow:0 0 16px rgba(124,58,237,.3)}
        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem}
        @media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
        .chart-card{background:#1A1A2E;border:1px solid rgba(124,58,237,.12);border-radius:14px;padding:1.5rem}
        .chart-card.full{grid-column:1/-1}
        .chart-title{font-size:1rem;font-weight:600;color:#F8FAFC;margin-bottom:1rem}
        table{width:100%;border-collapse:collapse;background:#1A1A2E;border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
        thead{background:rgba(124,58,237,.08)}
        th{padding:.75rem 1rem;text-align:left;font-size:.8rem;font-weight:600;color:#94A3B8;text-transform:uppercase}
        td{padding:.65rem 1rem;font-size:.85rem;border-top:1px solid rgba(124,58,237,.06)}
        .section-title{font-size:1.1rem;font-weight:600;color:#F8FAFC;margin:2rem 0 1rem}
        .empty{text-align:center;padding:2rem;color:#64748B}
    </style>
</head>
<body>
    <div class="bar">
        <a th:href="@{/admin/reports/revenue}">← Revenue Report</a>
        <span class="title">📈 Usage Report</span>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
    </div>
    <div class="container">
        <h1>📈 Usage Report</h1>

        <div class="filter-card">
            <form th:action="@{/admin/reports/usage}" method="get">
                <div class="filter-row">
                    <div class="form-group"><label class="form-label">Start Date</label><input type="date" name="startDate" th:value="${startDate}" class="form-input"></div>
                    <div class="form-group"><label class="form-label">End Date</label><input type="date" name="endDate" th:value="${endDate}" class="form-input"></div>
                    <button type="submit" class="btn-filter">Generate</button>
                </div>
            </form>
        </div>

        <div class="charts-grid">
            <!-- Tickets Per Route Chart -->
            <div class="chart-card" th:if="${routeLabels != null && !routeLabels.isEmpty()}">
                <div class="chart-title">🎫 Tickets Per Route</div>
                <canvas id="routeChart" height="200"></canvas>
            </div>
            <!-- Busiest Stations Chart -->
            <div class="chart-card" th:if="${stationLabels != null && !stationLabels.isEmpty()}">
                <div class="chart-title">🚉 Busiest Stations</div>
                <canvas id="stationChart" height="200"></canvas>
            </div>
            <!-- Peak Hours Chart -->
            <div class="chart-card full" th:if="${hourLabels != null && !hourLabels.isEmpty()}">
                <div class="chart-title">⏰ Peak Hours</div>
                <canvas id="peakChart" height="100"></canvas>
            </div>
        </div>

        <!-- Tables -->
        <div th:if="${ticketsPerRoute != null && !ticketsPerRoute.isEmpty()}">
            <div class="section-title">🎫 Tickets Per Route</div>
            <table>
                <thead><tr><th>Route</th><th>Tickets</th></tr></thead>
                <tbody><tr th:each="e : ${ticketsPerRoute}"><td th:text="${e.key}">Route</td><td th:text="${e.value}">0</td></tr></tbody>
            </table>
        </div>
        <div th:if="${busiestStations != null && !busiestStations.isEmpty()}">
            <div class="section-title">🚉 Busiest Stations</div>
            <table>
                <thead><tr><th>Station</th><th>Activity (tickets)</th></tr></thead>
                <tbody><tr th:each="e : ${busiestStations}"><td th:text="${e.key}">Station</td><td th:text="${e.value}">0</td></tr></tbody>
            </table>
        </div>
        <div th:if="${peakHours != null && !peakHours.isEmpty()}">
            <div class="section-title">⏰ Peak Hours</div>
            <table>
                <thead><tr><th>Hour</th><th>Bookings</th></tr></thead>
                <tbody><tr th:each="e : ${peakHours}"><td th:text="${e.key + ':00'}">0:00</td><td th:text="${e.value}">0</td></tr></tbody>
            </table>
        </div>
        <div th:if="${ticketsPerRoute == null || ticketsPerRoute.isEmpty()}" class="empty">Select a date range and click Generate.</div>
    </div>

    <script th:inline="javascript">
        const routeLabels = /*[[${routeLabels}]]*/ [];
        const routeValues = /*[[${routeValues}]]*/ [];
        const stationLabels = /*[[${stationLabels}]]*/ [];
        const stationValues = /*[[${stationValues}]]*/ [];
        const hourLabels = /*[[${hourLabels}]]*/ [];
        const hourValues = /*[[${hourValues}]]*/ [];

        const chartColors = ['#7C3AED','#10B981','#F59E0B','#EF4444','#3B82F6','#EC4899','#06B6D4','#8B5CF6'];
        function bgColors(n){return Array.from({length:n},(_,i)=>chartColors[i%chartColors.length]+'80');}
        function bdColors(n){return Array.from({length:n},(_,i)=>chartColors[i%chartColors.length]);}

        if(routeLabels.length){
            new Chart(document.getElementById('routeChart'),{
                type:'doughnut',
                data:{labels:routeLabels,datasets:[{data:routeValues,backgroundColor:bgColors(routeLabels.length),borderColor:bdColors(routeLabels.length),borderWidth:2}]},
                options:{responsive:true,plugins:{legend:{labels:{color:'#94A3B8',font:{size:11}}}}}
            });
        }
        if(stationLabels.length){
            new Chart(document.getElementById('stationChart'),{
                type:'bar',
                data:{labels:stationLabels,datasets:[{label:'Activity',data:stationValues,backgroundColor:'rgba(16,185,129,.5)',borderColor:'#10B981',borderWidth:2,borderRadius:6}]},
                options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94A3B8'},grid:{color:'rgba(124,58,237,.06)'}},y:{ticks:{color:'#94A3B8'},grid:{color:'rgba(124,58,237,.06)'}}}}
            });
        }
        if(hourLabels.length){
            new Chart(document.getElementById('peakChart'),{
                type:'line',
                data:{labels:hourLabels.map(h=>h+':00'),datasets:[{label:'Bookings',data:hourValues,borderColor:'#F59E0B',backgroundColor:'rgba(245,158,11,.15)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#F59E0B'}]},
                options:{responsive:true,plugins:{legend:{labels:{color:'#94A3B8'}}},scales:{x:{ticks:{color:'#94A3B8'},grid:{color:'rgba(124,58,237,.06)'}},y:{ticks:{color:'#94A3B8'},grid:{color:'rgba(124,58,237,.06)'}}}}
            });
        }
    </script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
