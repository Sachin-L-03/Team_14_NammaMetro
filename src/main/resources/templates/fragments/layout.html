<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- ============================================================
     Namma Metro — Shared Layout Fragments
     Include via: th:replace="~{fragments/layout :: navbar}"
     ============================================================ -->

<!-- NAVBAR FRAGMENT -->
<nav th:fragment="navbar" class="nm-navbar">
    <div class="nm-nav-inner">
        <a href="/" class="nm-brand">
            <span class="nm-brand-icon">🚇</span>
            <span class="nm-brand-text">Namma Metro</span>
        </a>
        <div class="nm-nav-links">
            <!-- Passenger links -->
            <th:block th:if="${#authorization != null}" sec:authorize="hasRole('PASSENGER')">
                <a th:href="@{/passenger/dashboard}" class="nm-link">Dashboard</a>
                <a th:href="@{/passenger/search}" class="nm-link">Search</a>
                <a th:href="@{/passenger/tickets/history}" class="nm-link">Tickets</a>
                <a th:href="@{/passenger/notifications}" class="nm-link nm-notif-link">
                    🔔
                    <span th:if="${unreadCount != null && unreadCount > 0}" class="nm-notif-badge" th:text="${unreadCount}">0</span>
                </a>
            </th:block>
            <!-- Operator links -->
            <th:block th:if="${#authorization != null}" sec:authorize="hasRole('OPERATOR')">
                <a th:href="@{/operator/dashboard}" class="nm-link">Dashboard</a>
                <a th:href="@{/operator/trains}" class="nm-link">Trains</a>
                <a th:href="@{/operator/schedules}" class="nm-link">Schedules</a>
                <a th:href="@{/operator/incidents}" class="nm-link">Incidents</a>
            </th:block>
            <!-- Admin links -->
            <th:block th:if="${#authorization != null}" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/dashboard}" class="nm-link">Dashboard</a>
                <a th:href="@{/admin/stations}" class="nm-link">Stations</a>
                <a th:href="@{/admin/routes}" class="nm-link">Routes</a>
                <a th:href="@{/admin/reports/revenue}" class="nm-link">Reports</a>
                <a th:href="@{/admin/logs}" class="nm-link">Logs</a>
            </th:block>
            <!-- Public -->
            <a th:href="@{/schedules/public}" class="nm-link">Schedules</a>
            <!-- Auth -->
            <th:block th:if="${#authorization != null}" sec:authorize="isAuthenticated()">
                <a th:href="@{/auth/logout}" class="nm-link nm-link-logout">Logout</a>
            </th:block>
            <th:block th:if="${#authorization != null}" sec:authorize="!isAuthenticated()">
                <a th:href="@{/auth/login}" class="nm-link">Login</a>
            </th:block>
        </div>
    </div>
</nav>

<!-- FOOTER FRAGMENT -->
<footer th:fragment="footer" class="nm-footer">
    <div class="nm-footer-inner">
        <span>© 2026 Namma Metro Operations &amp; Information Management System</span>
        <span class="nm-footer-tech">Built with Spring Boot • Thymeleaf • MySQL</span>
    </div>
</footer>

<!-- STYLES FOR FRAGMENTS -->
<th:block th:fragment="layout-styles">
<style>
    .nm-navbar{position:sticky;top:0;z-index:100;background:rgba(26,26,46,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(124,58,237,.15);padding:.75rem 2rem}
    .nm-nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .nm-brand{display:flex;align-items:center;gap:.5rem;text-decoration:none}
    .nm-brand-icon{font-size:1.3rem}
    .nm-brand-text{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#A78BFA,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nm-nav-links{display:flex;align-items:center;gap:.25rem}
    .nm-link{padding:.4rem .75rem;color:#94A3B8;font-size:.8rem;font-weight:500;text-decoration:none;border-radius:6px;transition:all .2s}
    .nm-link:hover{color:#E2E8F0;background:rgba(124,58,237,.08)}
    .nm-link-logout{color:#FCA5A5}
    .nm-link-logout:hover{background:rgba(239,68,68,.1);color:#F87171}
    .nm-notif-link{position:relative}
    .nm-notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;background:#EF4444;color:#fff;font-size:.6rem;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 3px}
    .nm-footer{background:rgba(26,26,46,.6);border-top:1px solid rgba(124,58,237,.08);padding:1rem 2rem;text-align:center}
    .nm-footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:#475569}
    .nm-footer-tech{color:#64748B}
    @media(max-width:768px){
        .nm-nav-inner{flex-direction:column;gap:.5rem}
        .nm-nav-links{flex-wrap:wrap;justify-content:center}
        .nm-footer-inner{flex-direction:column;gap:.25rem}
    }
</style>
</th:block>
</html>
