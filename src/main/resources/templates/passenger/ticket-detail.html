<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Detail — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .pax-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(16,185,129,.2)}
        .pax-bar a{color:#6EE7B7;text-decoration:none;font-weight:600;font-size:.9rem}
        .pax-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:550px;margin:0 auto;padding:2.5rem 2rem}
        .alert{padding:.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.875rem;font-weight:500}
        .alert-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6EE7B7}
        .alert-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
        .ticket-card{background:#1A1A2E;border:1px solid rgba(16,185,129,.15);border-radius:20px;overflow:hidden}
        .ticket-header{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(124,58,237,.1));padding:1.5rem 2rem;text-align:center;border-bottom:2px dashed rgba(16,185,129,.2)}
        .ticket-header h1{font-size:1.25rem;font-weight:700;color:#F8FAFC;margin-bottom:.3rem}
        .ticket-id{font-size:.8rem;color:#94A3B8}
        .ticket-status{display:inline-block;margin-top:.5rem}
        .badge-lg{padding:.35rem .85rem;border-radius:8px;font-size:.85rem;font-weight:700}
        .badge-booked{background:rgba(59,130,246,.15);color:#60A5FA;border:1px solid rgba(59,130,246,.3)}
        .badge-confirmed{background:rgba(16,185,129,.15);color:#6EE7B7;border:1px solid rgba(16,185,129,.3)}
        .badge-used{background:rgba(124,58,237,.15);color:#A78BFA;border:1px solid rgba(124,58,237,.3)}
        .badge-cancelled{background:rgba(239,68,68,.15);color:#FCA5A5;border:1px solid rgba(239,68,68,.3)}
        .badge-expired{background:rgba(100,116,139,.2);color:#94A3B8;border:1px solid rgba(100,116,139,.3)}
        .ticket-body{padding:1.5rem 2rem}
        .journey-visual{text-align:center;margin-bottom:1.5rem;padding:1rem 0}
        .station-name{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .station-code{font-size:.75rem;color:#94A3B8}
        .journey-arrow{color:#10B981;font-size:1.5rem;margin:0 1rem}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
        .detail-item{padding:.75rem;background:rgba(15,15,26,.4);border:1px solid rgba(16,185,129,.08);border-radius:10px}
        .detail-label{font-size:.7rem;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
        .detail-value{font-size:.9rem;font-weight:600;color:#E2E8F0}
        .fare-highlight{text-align:center;padding:1rem;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12);border-radius:12px;margin-bottom:1.5rem}
        .fare-amount{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#6EE7B7,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .fare-label{font-size:.75rem;color:#94A3B8}
        .qr-section{text-align:center;padding:1rem;margin-bottom:1.5rem}
        .qr-code{font-family:monospace;font-size:.85rem;color:#A78BFA;background:rgba(124,58,237,.08);padding:.6rem 1rem;border-radius:8px;border:1px solid rgba(124,58,237,.15);display:inline-block;letter-spacing:.05em}
        .qr-label{font-size:.7rem;color:#64748B;margin-bottom:.3rem}
        .refund-info{text-align:center;padding:.75rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:10px;margin-bottom:1rem;font-size:.85rem;color:#FBBF24}
        .action-buttons{display:flex;gap:.75rem}
        .btn-confirm{flex:1;padding:.75rem;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
        .btn-cancel{flex:1;padding:.75rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
        .btn-confirm:hover{transform:translateY(-2px);box-shadow:0 0 18px rgba(16,185,129,.3)}
        .btn-cancel:hover{background:rgba(239,68,68,.2)}
    </style>
</head>
<body>
    <div class="pax-bar">
        <a th:href="@{/passenger/tickets/history}">← History</a>
        <span class="title">Ticket Details</span>
        <a th:href="@{/passenger/dashboard}">Dashboard</a>
    </div>
    <div class="container">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="ticket-card">
            <div class="ticket-header">
                <h1>🎫 Namma Metro Ticket</h1>
                <div class="ticket-id">Ticket #<span th:text="${ticket.id}">1</span></div>
                <div class="ticket-status">
                    <span class="badge-lg badge-booked" th:if="${ticket.status.name() == 'BOOKED'}">BOOKED</span>
                    <span class="badge-lg badge-confirmed" th:if="${ticket.status.name() == 'CONFIRMED'}">CONFIRMED</span>
                    <span class="badge-lg badge-used" th:if="${ticket.status.name() == 'USED'}">USED</span>
                    <span class="badge-lg badge-cancelled" th:if="${ticket.status.name() == 'CANCELLED'}">CANCELLED</span>
                    <span class="badge-lg badge-expired" th:if="${ticket.status.name() == 'EXPIRED'}">EXPIRED</span>
                </div>
            </div>

            <div class="ticket-body">
                <!-- Journey -->
                <div class="journey-visual">
                    <span class="station-name" th:text="${ticket.sourceStation.name}">Source</span>
                    <span class="station-code" th:text="'(' + ${ticket.sourceStation.code} + ')'"> (SRC)</span>
                    <span class="journey-arrow"> → </span>
                    <span class="station-name" th:text="${ticket.destStation.name}">Dest</span>
                    <span class="station-code" th:text="'(' + ${ticket.destStation.code} + ')'"> (DST)</span>
                </div>

                <!-- Fare -->
                <div class="fare-highlight">
                    <div class="fare-label">FARE</div>
                    <div class="fare-amount">₹<span th:text="${ticket.fare}">25</span></div>
                </div>

                <!-- Details Grid -->
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="detail-label">Train</div>
                        <div class="detail-value" th:text="${ticket.schedule != null && ticket.schedule.train != null ? ticket.schedule.train.trainNumber : '—'}">NM001</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Booked On</div>
                        <div class="detail-value" th:text="${ticket.bookingTime != null ? #temporals.format(ticket.bookingTime, 'dd MMM yyyy HH:mm') : '—'}">—</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Departure</div>
                        <div class="detail-value" th:text="${ticket.schedule != null && ticket.schedule.departureTime != null ? ticket.schedule.departureTime : '—'}">—</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Date</div>
                        <div class="detail-value" th:text="${ticket.schedule != null && ticket.schedule.scheduleDate != null ? ticket.schedule.scheduleDate : '—'}">—</div>
                    </div>
                </div>

                <!-- QR Code (ZXing generated image) -->
                <div class="qr-section" th:if="${ticket.qrCode != null}">
                    <div class="qr-label">SCAN QR CODE</div>
                    <div th:if="${qrCodeImage != null}" style="margin-bottom:.5rem">
                        <img th:src="'data:image/png;base64,' + ${qrCodeImage}" alt="Ticket QR Code"
                             style="width:200px;height:200px;border-radius:12px;border:2px solid rgba(124,58,237,.2);background:#fff;padding:8px">
                    </div>
                    <div class="qr-code" th:text="${ticket.qrCode}">NM-XXXX-0000</div>
                </div>

                <!-- Refund Info (for cancelled tickets) -->
                <div class="refund-info" th:if="${ticket.status.name() == 'CANCELLED' && ticket.refundAmount != null}">
                    Refund: ₹<span th:text="${ticket.refundAmount}">0</span> processed
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons" th:if="${canConfirm || canCancel}">
                    <form th:if="${canConfirm}" th:action="@{'/passenger/tickets/' + ${ticket.id} + '/confirm'}" method="post" style="flex:1">
                        <button type="submit" class="btn-confirm" style="width:100%">✅ Confirm Ticket</button>
                    </form>
                    <form th:if="${canCancel}" th:action="@{'/passenger/tickets/' + ${ticket.id} + '/cancel'}" method="post" style="flex:1"
                          onsubmit="return confirm('Are you sure you want to cancel this ticket?')">
                        <button type="submit" class="btn-cancel" style="width:100%">❌ Cancel Ticket</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
