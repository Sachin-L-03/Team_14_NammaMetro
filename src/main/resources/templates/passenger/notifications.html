<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .pax-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(16,185,129,.2)}
        .pax-bar a{color:#6EE7B7;text-decoration:none;font-weight:600;font-size:.9rem}
        .pax-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:750px;margin:0 auto;padding:2.5rem 2rem}
        .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
        .top-row h1{font-size:1.5rem;font-weight:700;color:#F8FAFC}
        .unread-badge{background:rgba(239,68,68,.15);color:#FCA5A5;border:1px solid rgba(239,68,68,.3);padding:.3rem .7rem;border-radius:20px;font-size:.8rem;font-weight:600}
        .btn-read-all{padding:.5rem 1.2rem;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#6EE7B7;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
        .btn-read-all:hover{background:rgba(16,185,129,.2)}
        .alert-success{padding:.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.875rem;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6EE7B7}
        .notif-list{display:flex;flex-direction:column;gap:.75rem}
        .notif-card{background:#1A1A2E;border-radius:14px;padding:1.25rem 1.5rem;border-left:4px solid rgba(100,116,139,.3);transition:all .3s}
        .notif-card:hover{background:rgba(26,26,46,.95)}
        .notif-card.unread{border-left-color:#10B981;background:rgba(16,185,129,.03)}
        .notif-card.type-delay{border-left-color:#F59E0B}
        .notif-card.type-cancellation{border-left-color:#EF4444}
        .notif-card.type-booking_confirmed{border-left-color:#10B981}
        .notif-card.type-booking_cancelled{border-left-color:#F87171}
        .notif-card.type-ticket_expired{border-left-color:#94A3B8}
        .notif-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem}
        .notif-title{font-size:.95rem;font-weight:600;color:#F8FAFC}
        .notif-time{font-size:.75rem;color:#475569}
        .notif-type{display:inline-block;padding:.15rem .5rem;border-radius:5px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-right:.5rem}
        .type-delay{background:rgba(245,158,11,.12);color:#FBBF24}
        .type-cancellation{background:rgba(239,68,68,.12);color:#FCA5A5}
        .type-booking_confirmed{background:rgba(16,185,129,.12);color:#6EE7B7}
        .type-booking_cancelled{background:rgba(248,113,113,.12);color:#F87171}
        .type-ticket_expired{background:rgba(100,116,139,.15);color:#94A3B8}
        .type-general{background:rgba(59,130,246,.12);color:#60A5FA}
        .notif-msg{font-size:.85rem;color:#94A3B8;line-height:1.5}
        .notif-actions{display:flex;align-items:center;gap:.75rem;margin-top:.5rem}
        .btn-mark-read{padding:.25rem .6rem;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);color:#6EE7B7;border-radius:6px;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
        .btn-mark-read:hover{background:rgba(16,185,129,.15)}
        .read-indicator{font-size:.75rem;color:#475569}
        .empty-msg{text-align:center;padding:3rem;color:#64748B;font-size:.95rem}
    </style>
</head>
<body>
    <div class="pax-bar">
        <a th:href="@{/passenger/dashboard}">← Dashboard</a>
        <span class="title">🔔 Notifications</span>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
    <div class="container">
        <div class="top-row">
            <h1>🔔 Notifications
                <span class="unread-badge" th:if="${unreadCount != null && unreadCount > 0}" th:text="${unreadCount + ' unread'}">0</span>
            </h1>
            <form th:if="${notifications != null && !notifications.isEmpty()}" th:action="@{/passenger/notifications/read-all}" method="post" style="margin:0">
                <button type="submit" class="btn-read-all">✓ Mark all read</button>
            </form>
        </div>

        <div th:if="${success}" class="alert-success" th:text="${success}"></div>

        <div class="notif-list" th:if="${notifications != null && !notifications.isEmpty()}">
            <div th:each="n : ${notifications}"
                 th:classappend="'notif-card' + (${!n.isRead} ? ' unread' : '') + (${n.notificationType != null} ? ' type-' + ${n.notificationType.name().toLowerCase()} : '')"
                 class="notif-card">
                <div class="notif-top">
                    <div>
                        <span th:if="${n.notificationType != null}"
                              th:classappend="'notif-type type-' + ${n.notificationType.name().toLowerCase()}"
                              class="notif-type"
                              th:text="${n.notificationType.name()}">TYPE</span>
                        <span class="notif-title" th:text="${n.title}">Title</span>
                    </div>
                    <span class="notif-time" th:text="${n.createdAt != null ? #temporals.format(n.createdAt, 'dd MMM yyyy HH:mm') : '—'}">—</span>
                </div>
                <div class="notif-msg" th:text="${n.message}">Message body</div>
                <div class="notif-actions">
                    <form th:if="${!n.isRead}" th:action="@{'/passenger/notifications/' + ${n.id} + '/read'}" method="post" style="margin:0">
                        <button type="submit" class="btn-mark-read">Mark as read</button>
                    </form>
                    <span th:if="${n.isRead}" class="read-indicator">✓ Read</span>
                </div>
            </div>
        </div>

        <div th:if="${notifications == null || notifications.isEmpty()}" class="empty-msg">
            No notifications yet. You'll be notified about delays, cancellations, and booking updates.
        </div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
