<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Edit Schedule' : 'Create Schedule'} + ' — Namma Metro'">Schedule Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .op-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(245,158,11,.2)}
        .op-bar a{color:#FBBF24;text-decoration:none;font-weight:600;font-size:.9rem}
        .op-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:600px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:1.5rem}
        .alert-error{padding:.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.875rem;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
        .form-card{background:#1A1A2E;border:1px solid rgba(245,158,11,.15);border-radius:16px;padding:2rem}
        .form-group{margin-bottom:1.15rem}
        .form-label{display:block;font-size:.85rem;font-weight:500;color:#CBD5E1;margin-bottom:.4rem}
        .form-input,.form-select{width:100%;padding:.7rem 1rem;background:rgba(15,15,26,.6);border:1px solid rgba(245,158,11,.2);border-radius:10px;color:#E2E8F0;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:border .3s}
        .form-input:focus,.form-select:focus{border-color:#F59E0B;box-shadow:0 0 10px rgba(245,158,11,.2)}
        .form-select option{background:#1A1A2E;color:#E2E8F0}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .btn-submit{width:100%;padding:.8rem;margin-top:.75rem;background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 0 18px rgba(245,158,11,.2)}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(245,158,11,.35)}
    </style>
</head>
<body>
    <div class="op-bar">
        <a th:href="@{/operator/schedules}">← Back to Schedules</a>
        <span class="title" th:text="${isEdit ? 'Edit Schedule' : 'Create Schedule'}">Form</span>
        <span></span>
    </div>
    <div class="container">
        <h1 th:text="${isEdit ? '✏️ Edit Schedule' : '➕ Create Schedule'}">Form</h1>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <div class="form-card">
            <form th:action="@{/operator/schedules}" method="post">
                <input type="hidden" name="isEdit" th:value="${isEdit}">
                <input type="hidden" name="scheduleId" th:value="${schedule != null ? schedule.id : ''}" th:if="${isEdit}">

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="trainId">Train *</label>
                        <select id="trainId" name="trainId" class="form-select" required>
                            <option value="">Select Train</option>
                            <option th:each="t : ${trains}" th:value="${t.id}"
                                    th:text="${t.trainNumber + (t.name != null ? ' — ' + t.name : '')}"
                                    th:selected="${schedule != null && schedule.train != null && schedule.train.id == t.id}">Train</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="stationId">Station *</label>
                        <select id="stationId" name="stationId" class="form-select" required>
                            <option value="">Select Station</option>
                            <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name + ' (' + s.code + ')'}"
                                    th:selected="${schedule != null && schedule.station != null && schedule.station.id == s.id}">Station</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="scheduleDate">Date</label>
                    <input type="date" id="scheduleDate" name="scheduleDate" class="form-input"
                           th:value="${schedule != null && schedule.scheduleDate != null ? schedule.scheduleDate : ''}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="departureTime">Departure Time</label>
                        <input type="time" id="departureTime" name="departureTime" class="form-input"
                               th:value="${schedule != null && schedule.departureTime != null ? schedule.departureTime : ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="arrivalTime">Arrival Time</label>
                        <input type="time" id="arrivalTime" name="arrivalTime" class="form-input"
                               th:value="${schedule != null && schedule.arrivalTime != null ? schedule.arrivalTime : ''}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="scheduleStatus">Status *</label>
                        <select id="scheduleStatus" name="scheduleStatus" class="form-select" required>
                            <option th:each="st : ${statuses}" th:value="${st.name()}" th:text="${st.name()}"
                                    th:selected="${schedule != null && schedule.scheduleStatus != null && schedule.scheduleStatus.name() == st.name()}">Status</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="dayOfWeek">Day of Week</label>
                        <select id="dayOfWeek" name="dayOfWeek" class="form-select">
                            <option value="">Any</option>
                            <option th:each="d : ${ {'MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'} }"
                                    th:value="${d}" th:text="${d}"
                                    th:selected="${schedule != null && schedule.dayOfWeek == d}">Day</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-submit"
                        th:text="${isEdit ? 'Update Schedule' : 'Create Schedule'}">Save</button>
            </form>
        </div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
