<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedules — Namma Metro Operator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .op-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(245,158,11,.2)}
        .op-bar a{color:#FBBF24;text-decoration:none;font-weight:600;font-size:.9rem}
        .op-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:1100px;margin:0 auto;padding:2.5rem 2rem}
        .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
        .top-row h1{font-size:1.5rem;font-weight:700;color:#F8FAFC}
        .btn-add{padding:.6rem 1.4rem;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:.875rem;text-decoration:none;transition:all .3s}
        .btn-add:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(16,185,129,.3);color:#fff}
        .alert{padding:.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.875rem;font-weight:500}
        .alert-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
        .alert-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6EE7B7}
        table{width:100%;border-collapse:collapse;background:#1A1A2E;border-radius:12px;overflow:hidden}
        thead{background:rgba(245,158,11,.08)}
        th{padding:.85rem 1rem;text-align:left;font-size:.8rem;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em}
        td{padding:.85rem 1rem;font-size:.9rem;border-top:1px solid rgba(245,158,11,.08)}
        tr:hover td{background:rgba(245,158,11,.03)}
        .badge-s{padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600}
        .badge-active{background:rgba(16,185,129,.15);color:#6EE7B7}
        .badge-cancelled{background:rgba(239,68,68,.15);color:#FCA5A5}
        .badge-completed{background:rgba(124,58,237,.15);color:#A78BFA}
        .actions a{margin-right:.75rem;font-size:.85rem;font-weight:500}
        .edit{color:#60A5FA}.delete{color:#F87171}
        .empty{text-align:center;padding:3rem;color:#64748B}
    </style>
</head>
<body>
    <div class="op-bar">
        <a th:href="@{/operator/dashboard}">← Dashboard</a>
        <span class="title">Manage Schedules</span>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
    <div class="container">
        <div class="top-row">
            <h1>🕐 Schedules</h1>
            <a th:href="@{/operator/schedules/new}" class="btn-add">+ Create Schedule</a>
        </div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <table th:if="${!schedules.isEmpty()}">
            <thead><tr><th>ID</th><th>Train</th><th>Station</th><th>Date</th><th>Departure</th><th>Arrival</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="s : ${schedules}">
                    <td th:text="${s.id}">1</td>
                    <td th:text="${s.train != null ? s.train.trainNumber : '—'}">NM001</td>
                    <td th:text="${s.station != null ? s.station.name : '—'}">Station</td>
                    <td th:text="${s.scheduleDate != null ? s.scheduleDate : (s.dayOfWeek != null ? s.dayOfWeek : '—')}">—</td>
                    <td th:text="${s.departureTime != null ? s.departureTime : '—'}">—</td>
                    <td th:text="${s.arrivalTime != null ? s.arrivalTime : '—'}">—</td>
                    <td>
                        <span class="badge-s badge-active" th:if="${s.scheduleStatus != null && s.scheduleStatus.name() == 'ACTIVE'}">Active</span>
                        <span class="badge-s badge-cancelled" th:if="${s.scheduleStatus != null && s.scheduleStatus.name() == 'CANCELLED'}">Cancelled</span>
                        <span class="badge-s badge-completed" th:if="${s.scheduleStatus != null && s.scheduleStatus.name() == 'COMPLETED'}">Completed</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{'/operator/schedules/' + ${s.id} + '/edit'}" class="edit">Edit</a>
                        <a th:href="@{'/operator/schedules/' + ${s.id} + '/delete'}" class="delete" onclick="return confirm('Delete this schedule?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${schedules.isEmpty()}" class="empty">No schedules found.</div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
