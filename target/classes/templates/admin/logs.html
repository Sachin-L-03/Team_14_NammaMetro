<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(124,58,237,.2)}
        .bar a{color:#A78BFA;text-decoration:none;font-weight:600;font-size:.9rem}
        .bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:1100px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:1.5rem}
        .filter-bar{display:flex;align-items:end;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
        .form-group{min-width:160px}
        .form-label{display:block;font-size:.8rem;font-weight:500;color:#94A3B8;margin-bottom:.3rem}
        .form-select{width:100%;padding:.55rem .85rem;background:rgba(15,15,26,.6);border:1px solid rgba(124,58,237,.2);border-radius:8px;color:#E2E8F0;font-size:.85rem;font-family:'Inter',sans-serif;outline:none}
        .form-select:focus{border-color:#7C3AED}
        .form-select option{background:#1A1A2E;color:#E2E8F0}
        .btn-filter{padding:.55rem 1.2rem;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
        .btn-reset{padding:.55rem 1.2rem;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.25);color:#CBD5E1;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:'Inter',sans-serif}
        .summary{color:#94A3B8;font-size:.85rem;margin-bottom:1rem}
        table{width:100%;border-collapse:collapse;background:#1A1A2E;border-radius:12px;overflow:hidden}
        thead{background:rgba(124,58,237,.08)}
        th{padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.04em}
        td{padding:.65rem 1rem;font-size:.85rem;border-top:1px solid rgba(124,58,237,.06)}
        tr:hover td{background:rgba(124,58,237,.03)}
        .action-badge{display:inline-block;padding:.15rem .5rem;border-radius:5px;font-size:.7rem;font-weight:600;text-transform:uppercase}
        .action-create{background:rgba(16,185,129,.12);color:#6EE7B7}
        .action-update,.action-status_change{background:rgba(59,130,246,.12);color:#60A5FA}
        .action-delete{background:rgba(239,68,68,.12);color:#FCA5A5}
        .action-book{background:rgba(124,58,237,.12);color:#A78BFA}
        .action-cancel{background:rgba(245,158,11,.12);color:#FBBF24}
        .action-train_status_change{background:rgba(236,72,153,.12);color:#F472B6}
        .action-default{background:rgba(100,116,139,.15);color:#94A3B8}
        .details-cell{max-width:350px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#94A3B8;font-size:.8rem}
        .empty{text-align:center;padding:3rem;color:#64748B}
        .pagination{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1.5rem}
        .page-btn{padding:.45rem .9rem;background:#1A1A2E;border:1px solid rgba(124,58,237,.15);color:#CBD5E1;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:500;transition:all .2s}
        .page-btn:hover{border-color:#7C3AED;color:#A78BFA}
        .page-btn.active{background:rgba(124,58,237,.15);border-color:#7C3AED;color:#A78BFA}
        .page-btn.disabled{opacity:.3;pointer-events:none}
    </style>
</head>
<body>
    <div class="bar">
        <a th:href="@{/admin/dashboard}">← Dashboard</a>
        <span class="title">📋 System Logs</span>
        <a th:href="@{/admin/reports/revenue}">Reports →</a>
    </div>
    <div class="container">
        <h1>📋 System Logs</h1>

        <div class="filter-bar">
            <form th:action="@{/admin/logs}" method="get" style="display:flex;gap:1rem;align-items:end;flex-wrap:wrap">
                <div class="form-group">
                    <label class="form-label">Filter by Action</label>
                    <select name="action" class="form-select">
                        <option value="">All Actions</option>
                        <option th:each="a : ${actions}" th:value="${a}" th:text="${a}" th:selected="${selectedAction != null && selectedAction == a}">Action</option>
                    </select>
                </div>
                <button type="submit" class="btn-filter">Filter</button>
                <a th:href="@{/admin/logs}" class="btn-reset">Reset</a>
            </form>
        </div>

        <p class="summary" th:if="${totalItems != null}">
            Showing page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
            (<span th:text="${totalItems}">0</span> total entries)
            <span th:if="${selectedAction != null && !selectedAction.isEmpty()}"> — filtered by: <strong th:text="${selectedAction}">action</strong></span>
        </p>

        <table th:if="${logs != null && !logs.isEmpty()}">
            <thead><tr><th>#</th><th>Action</th><th>Entity</th><th>Entity ID</th><th>Details</th><th>User</th><th>Timestamp</th></tr></thead>
            <tbody>
                <tr th:each="l : ${logs}">
                    <td th:text="${l.id}">1</td>
                    <td>
                        <span th:classappend="'action-badge action-' + ${l.action != null ? l.action.toLowerCase() : 'default'}"
                              class="action-badge" th:text="${l.action}">ACTION</span>
                    </td>
                    <td th:text="${l.entity}">—</td>
                    <td th:text="${l.entityId}">—</td>
                    <td class="details-cell" th:text="${l.details}" th:title="${l.details}">Details</td>
                    <td th:text="${l.user != null ? l.user.name : 'SYSTEM'}">—</td>
                    <td th:text="${l.createdAt != null ? #temporals.format(l.createdAt, 'dd MMM yyyy HH:mm:ss') : '—'}">—</td>
                </tr>
            </tbody>
        </table>
        <div th:if="${logs == null || logs.isEmpty()}" class="empty">No log entries found.</div>

        <div class="pagination" th:if="${totalPages != null && totalPages > 1}">
            <a th:href="@{'/admin/logs?page=' + ${currentPage - 1} + (${selectedAction != null ? '&action=' + selectedAction : ''})}"
               th:classappend="${currentPage == 0 ? 'disabled' : ''}" class="page-btn">← Prev</a>
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{'/admin/logs?page=' + ${i} + (${selectedAction != null ? '&action=' + selectedAction : ''})}"
                   th:text="${i + 1}" th:classappend="${i == currentPage ? 'active' : ''}" class="page-btn">1</a>
            </span>
            <a th:href="@{'/admin/logs?page=' + ${currentPage + 1} + (${selectedAction != null ? '&action=' + selectedAction : ''})}"
               th:classappend="${currentPage + 1 >= totalPages ? 'disabled' : ''}" class="page-btn">Next →</a>
        </div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
