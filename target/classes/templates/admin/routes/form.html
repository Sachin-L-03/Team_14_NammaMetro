<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Edit Route' : 'Add Route'} + ' — Namma Metro Admin'">Route Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .admin-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(239,68,68,.2)}
        .admin-bar a{color:#F87171;text-decoration:none;font-weight:600;font-size:.9rem}
        .admin-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:640px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:1.5rem}
        .alert{padding:.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.875rem;font-weight:500}
        .alert-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
        .form-card{background:#1A1A2E;border:1px solid rgba(124,58,237,.15);border-radius:16px;padding:2rem}
        .form-group{margin-bottom:1.15rem}
        .form-label{display:block;font-size:.85rem;font-weight:500;color:#CBD5E1;margin-bottom:.4rem}
        .form-input,.form-select{width:100%;padding:.7rem 1rem;background:rgba(15,15,26,.6);border:1px solid rgba(124,58,237,.2);border-radius:10px;color:#E2E8F0;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:border .3s}
        .form-input:focus,.form-select:focus{border-color:#7C3AED;box-shadow:0 0 10px rgba(124,58,237,.2)}
        .form-select option{background:#1A1A2E;color:#E2E8F0}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .form-hint{font-size:.75rem;color:#64748B;margin-top:.3rem}
        .btn-submit{width:100%;padding:.8rem;margin-top:.75rem;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 0 18px rgba(124,58,237,.2)}
        .btn-submit:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(124,58,237,.35)}
        select[multiple]{min-height:120px}
    </style>
</head>
<body>
    <div class="admin-bar">
        <a th:href="@{/admin/routes}">← Back to Routes</a>
        <span class="title" th:text="${isEdit ? 'Edit Route' : 'Add New Route'}">Route Form</span>
        <span></span>
    </div>
    <div class="container">
        <h1 th:text="${isEdit ? '✏️ Edit Route' : '➕ Add New Route'}">Route Form</h1>
        <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

        <div class="form-card">
            <form th:action="@{/admin/routes}" method="post">
                <input type="hidden" name="isEdit" th:value="${isEdit}">
                <input type="hidden" name="routeId" th:value="${route.id}" th:if="${isEdit}">

                <div class="form-group">
                    <label class="form-label" for="name">Route Name *</label>
                    <input type="text" id="name" name="name" class="form-input"
                           th:value="${route.name}" required maxlength="100" placeholder="e.g. Purple Line Express">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="startStationId">Source Station *</label>
                        <select id="startStationId" name="startStationId" class="form-select" required>
                            <option value="">Select Source</option>
                            <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name + ' (' + s.code + ')'}"
                                    th:selected="${route.startStation != null && route.startStation.id == s.id}">Station</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="endStationId">Destination Station *</label>
                        <select id="endStationId" name="endStationId" class="form-select" required>
                            <option value="">Select Destination</option>
                            <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name + ' (' + s.code + ')'}"
                                    th:selected="${route.endStation != null && route.endStation.id == s.id}">Station</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="intermediateStationIds">Intermediate Stations</label>
                    <select id="intermediateStationIds" name="intermediateStationIds" class="form-select" multiple>
                        <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name + ' (' + s.code + ')'}"
                                th:selected="${route.intermediateStations != null && route.intermediateStations.contains(s)}">Station</option>
                    </select>
                    <p class="form-hint">Hold Ctrl/Cmd to select multiple stations in order.</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="distanceKm">Total Distance (km)</label>
                        <input type="number" id="distanceKm" name="distanceKm" class="form-input"
                               th:value="${route.distanceKm}" step="0.01" min="0" placeholder="e.g. 18.50">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="durationMin">Estimated Duration (min)</label>
                        <input type="number" id="durationMin" name="durationMin" class="form-input"
                               th:value="${route.durationMin}" min="0" placeholder="e.g. 35">
                    </div>
                </div>

                <button type="submit" class="btn-submit"
                        th:text="${isEdit ? 'Update Route' : 'Create Route'}">Save</button>
            </form>
        </div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
