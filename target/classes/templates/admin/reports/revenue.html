<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Report — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(124,58,237,.2)}
        .bar a{color:#A78BFA;text-decoration:none;font-weight:600;font-size:.9rem}
        .bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:1000px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:1.5rem}
        .filter-card{background:#1A1A2E;border:1px solid rgba(124,58,237,.15);border-radius:14px;padding:1.5rem;margin-bottom:2rem}
        .filter-row{display:flex;gap:1rem;align-items:end;flex-wrap:wrap}
        .form-group{flex:1;min-width:140px}
        .form-label{display:block;font-size:.8rem;font-weight:500;color:#94A3B8;margin-bottom:.3rem}
        .form-input,.form-select{width:100%;padding:.6rem .85rem;background:rgba(15,15,26,.6);border:1px solid rgba(124,58,237,.2);border-radius:8px;color:#E2E8F0;font-size:.85rem;font-family:'Inter',sans-serif;outline:none}
        .form-input:focus,.form-select:focus{border-color:#7C3AED}
        .form-select option{background:#1A1A2E;color:#E2E8F0}
        .btn-filter{padding:.6rem 1.5rem;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
        .btn-filter:hover{transform:translateY(-1px);box-shadow:0 0 16px rgba(124,58,237,.3)}
        .stat-card{display:inline-block;padding:1rem 1.5rem;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.15);border-radius:12px;margin-bottom:2rem}
        .stat-label{font-size:.75rem;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em}
        .stat-value{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#A78BFA,#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .chart-container{background:#1A1A2E;border:1px solid rgba(124,58,237,.12);border-radius:14px;padding:1.5rem;margin-bottom:2rem}
        .chart-title{font-size:1rem;font-weight:600;color:#F8FAFC;margin-bottom:1rem}
        table{width:100%;border-collapse:collapse;background:#1A1A2E;border-radius:12px;overflow:hidden;margin-top:1rem}
        thead{background:rgba(124,58,237,.08)}
        th{padding:.85rem 1rem;text-align:left;font-size:.8rem;font-weight:600;color:#94A3B8;text-transform:uppercase}
        td{padding:.75rem 1rem;font-size:.9rem;border-top:1px solid rgba(124,58,237,.06)}
        .empty{text-align:center;padding:2rem;color:#64748B}
    </style>
</head>
<body>
    <div class="bar">
        <a th:href="@{/admin/dashboard}">← Dashboard</a>
        <span class="title">📊 Revenue Report</span>
        <a th:href="@{/admin/reports/usage}">Usage Report →</a>
    </div>
    <div class="container">
        <h1>📊 Revenue Report</h1>

        <div class="filter-card">
            <form th:action="@{/admin/reports/revenue}" method="get">
                <div class="filter-row">
                    <div class="form-group"><label class="form-label">Start Date</label><input type="date" name="startDate" th:value="${startDate}" class="form-input"></div>
                    <div class="form-group"><label class="form-label">End Date</label><input type="date" name="endDate" th:value="${endDate}" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Route</label>
                        <select name="routeId" class="form-select">
                            <option value="">All Routes</option>
                            <option th:each="r : ${routes}" th:value="${r.id}" th:text="${r.name}" th:selected="${selectedRouteId != null && selectedRouteId == r.id}">Route</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-filter">Generate</button>
                </div>
            </form>
        </div>

        <div class="stat-card" th:if="${totalRevenue != null}">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value">₹<span th:text="${totalRevenue}">0</span></div>
        </div>

        <div class="chart-container" th:if="${chartLabels != null && !chartLabels.isEmpty()}">
            <div class="chart-title">Daily Revenue</div>
            <canvas id="revenueChart" height="120"></canvas>
        </div>

        <table th:if="${revenueByDay != null && !revenueByDay.isEmpty()}">
            <thead><tr><th>Date</th><th>Revenue (₹)</th></tr></thead>
            <tbody>
                <tr th:each="entry : ${revenueByDay}"><td th:text="${entry.key}">Date</td><td>₹<span th:text="${entry.value}">0</span></td></tr>
            </tbody>
        </table>
        <div th:if="${revenueByDay == null || revenueByDay.isEmpty()}" class="empty">Select a date range and click Generate.</div>
    </div>

    <script th:if="${chartLabels != null && !chartLabels.isEmpty()}" th:inline="javascript">
        const labels = /*[[${chartLabels}]]*/ [];
        const values = /*[[${chartValues}]]*/ [];
        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Revenue (₹)',
                    data: values.map(v => parseFloat(v)),
                    backgroundColor: 'rgba(124, 58, 237, 0.5)',
                    borderColor: '#7C3AED',
                    borderWidth: 2,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#94A3B8' } } },
                scales: {
                    x: { ticks: { color: '#94A3B8' }, grid: { color: 'rgba(124,58,237,0.06)' } },
                    y: { ticks: { color: '#94A3B8' }, grid: { color: 'rgba(124,58,237,0.06)' } }
                }
            }
        });
    </script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
