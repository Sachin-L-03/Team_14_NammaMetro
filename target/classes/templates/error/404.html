<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .err-box{text-align:center;max-width:480px;padding:3rem}
        .err-code{font-size:8rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#7C3AED,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .err-icon{font-size:4rem;margin:1rem 0}
        .err-title{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:.5rem}
        .err-msg{color:#94A3B8;margin-bottom:2rem;line-height:1.6}
        .err-btn{display:inline-block;padding:.75rem 2rem;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.9rem;transition:all .3s}
        .err-btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(124,58,237,.3)}
    </style>
</head>
<body>
    <div class="err-box">
        <div class="err-code">404</div>
        <div class="err-icon">🚇</div>
        <div class="err-title">Station Not Found</div>
        <p class="err-msg">The page you're looking for doesn't exist. It might have been moved, or the train may have left the station.</p>
        <a href="/" class="err-btn">← Back to Home</a>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
