<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Train Status — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .op-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(245,158,11,.2)}
        .op-bar a{color:#FBBF24;text-decoration:none;font-weight:600;font-size:.9rem}
        .op-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:520px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:.5rem}
        .train-info{color:#94A3B8;font-size:.9rem;margin-bottom:1.5rem}
        .train-info strong{color:#FBBF24}
        .alert-error{padding:.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.875rem;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
        .form-card{background:#1A1A2E;border:1px solid rgba(245,158,11,.15);border-radius:16px;padding:2rem}
        .current-state{margin-bottom:1.5rem;padding:1rem;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:10px;text-align:center}
        .current-state-label{font-size:.8rem;color:#94A3B8;margin-bottom:.25rem}
        .current-state-value{font-size:1.5rem;font-weight:700;color:#FBBF24}
        .transition-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
        .transition-btn{padding:.75rem 1rem;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;border:2px solid;transition:all .3s;font-family:'Inter',sans-serif;text-align:center}
        .transition-btn:hover{transform:translateY(-2px)}
        .t-running{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#6EE7B7}
        .t-running:hover{background:rgba(16,185,129,.2)}
        .t-delayed{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#FBBF24}
        .t-delayed:hover{background:rgba(245,158,11,.2)}
        .t-cancelled{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#FCA5A5}
        .t-cancelled:hover{background:rgba(239,68,68,.2)}
        .t-maintenance{background:rgba(100,116,139,.1);border-color:rgba(100,116,139,.3);color:#94A3B8}
        .t-maintenance:hover{background:rgba(100,116,139,.2)}
        .t-scheduled{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:#60A5FA}
        .t-scheduled:hover{background:rgba(59,130,246,.2)}
        .t-completed{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.3);color:#A78BFA}
        .t-completed:hover{background:rgba(124,58,237,.2)}
        .no-transitions{text-align:center;padding:1.5rem;color:#64748B;font-size:.9rem}
    </style>
</head>
<body>
    <div class="op-bar">
        <a th:href="@{/operator/trains}">← Back to Trains</a>
        <span class="title">Update Train Status</span>
        <span></span>
    </div>
    <div class="container">
        <h1>🔄 Update Status</h1>
        <p class="train-info">
            Train: <strong th:text="${train.trainNumber}">NM001</strong>
            <span th:if="${train.name != null}"> — <span th:text="${train.name}">Name</span></span>
        </p>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <div class="form-card">
            <div class="current-state">
                <div class="current-state-label">Current Status</div>
                <div class="current-state-value" th:text="${currentStateName}">Scheduled</div>
            </div>

            <div th:if="${allowedTransitions != null && !allowedTransitions.isEmpty()}">
                <p style="font-size:.85rem;color:#94A3B8;margin-bottom:.75rem;text-align:center">Select new status:</p>
                <div class="transition-grid">
                    <form th:each="ts : ${allowedTransitions}"
                          th:action="@{'/operator/trains/' + ${train.id} + '/status'}" method="post" style="display:contents">
                        <input type="hidden" name="newStatus" th:value="${ts.name()}">
                        <button type="submit"
                                th:text="${ts.name()}"
                                th:classappend="'transition-btn t-' + ${ts.name().toLowerCase()}"
                                class="transition-btn">STATUS</button>
                    </form>
                </div>
            </div>

            <div th:if="${allowedTransitions == null || allowedTransitions.isEmpty()}" class="no-transitions">
                No transitions available from this state.
            </div>
        </div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
