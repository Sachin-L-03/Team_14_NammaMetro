<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolve Incident — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .op-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(245,158,11,.2)}
        .op-bar a{color:#FBBF24;text-decoration:none;font-weight:600;font-size:.9rem}
        .op-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:600px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:1.5rem}
        .incident-card{background:#1A1A2E;border:1px solid rgba(239,68,68,.15);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
        .incident-title{font-size:1.1rem;font-weight:600;color:#F8FAFC;margin-bottom:.5rem}
        .incident-meta{font-size:.85rem;color:#94A3B8;margin-bottom:.5rem}
        .incident-meta strong{color:#CBD5E1}
        .incident-desc{font-size:.9rem;color:#CBD5E1;line-height:1.6;border-top:1px solid rgba(239,68,68,.1);padding-top:.75rem;margin-top:.75rem}
        .badge-s{padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600}
        .badge-high{background:rgba(239,68,68,.2);color:#F87171}
        .badge-medium{background:rgba(245,158,11,.15);color:#FBBF24}
        .badge-low{background:rgba(59,130,246,.15);color:#60A5FA}
        .form-card{background:#1A1A2E;border:1px solid rgba(16,185,129,.15);border-radius:16px;padding:2rem}
        .form-group{margin-bottom:1.15rem}
        .form-label{display:block;font-size:.85rem;font-weight:500;color:#CBD5E1;margin-bottom:.4rem}
        .form-textarea{width:100%;padding:.7rem 1rem;background:rgba(15,15,26,.6);border:1px solid rgba(16,185,129,.2);border-radius:10px;color:#E2E8F0;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;min-height:120px;resize:vertical;transition:border .3s}
        .form-textarea:focus{border-color:#10B981;box-shadow:0 0 10px rgba(16,185,129,.15)}
        .btn-resolve{width:100%;padding:.8rem;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 0 18px rgba(16,185,129,.2)}
        .btn-resolve:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(16,185,129,.35)}
    </style>
</head>
<body>
    <div class="op-bar">
        <a th:href="@{/operator/incidents}">← Back to Incidents</a>
        <span class="title">Resolve Incident</span>
        <span></span>
    </div>
    <div class="container">
        <h1>✅ Resolve Incident</h1>

        <!-- Incident Details -->
        <div class="incident-card">
            <div class="incident-title" th:text="${incident.title}">Incident Title</div>
            <div class="incident-meta">
                <strong>Type:</strong> <span th:text="${incident.type}">Type</span> •
                <strong>Severity:</strong>
                <span class="badge-s badge-high" th:if="${incident.severity.name() == 'HIGH'}">HIGH</span>
                <span class="badge-s badge-medium" th:if="${incident.severity.name() == 'MEDIUM'}">MEDIUM</span>
                <span class="badge-s badge-low" th:if="${incident.severity.name() == 'LOW'}">LOW</span>
                <span th:if="${incident.train != null}"> • <strong>Train:</strong> <span th:text="${incident.train.trainNumber}">NM001</span></span>
            </div>
            <div class="incident-desc" th:if="${incident.description != null}" th:text="${incident.description}">Description</div>
        </div>

        <!-- Resolution Form -->
        <div class="form-card">
            <form th:action="@{'/operator/incidents/' + ${incident.id} + '/resolve'}" method="post">
                <div class="form-group">
                    <label class="form-label" for="resolutionNote">Resolution Note *</label>
                    <textarea id="resolutionNote" name="resolutionNote" class="form-textarea" required
                              placeholder="Describe how the incident was resolved..."></textarea>
                </div>
                <button type="submit" class="btn-resolve">✅ Mark as Resolved</button>
            </form>
        </div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
