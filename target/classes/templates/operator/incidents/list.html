<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidents — Namma Metro Operator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .op-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(245,158,11,.2)}
        .op-bar a{color:#FBBF24;text-decoration:none;font-weight:600;font-size:.9rem}
        .op-bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:1100px;margin:0 auto;padding:2.5rem 2rem}
        .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
        .top-row h1{font-size:1.5rem;font-weight:700;color:#F8FAFC}
        .btn-add{padding:.6rem 1.4rem;background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:.875rem;text-decoration:none;transition:all .3s}
        .btn-add:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(239,68,68,.3);color:#fff}
        .alert{padding:.75rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.875rem;font-weight:500}
        .alert-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
        .alert-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6EE7B7}
        table{width:100%;border-collapse:collapse;background:#1A1A2E;border-radius:12px;overflow:hidden}
        thead{background:rgba(245,158,11,.08)}
        th{padding:.85rem 1rem;text-align:left;font-size:.8rem;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.05em}
        td{padding:.85rem 1rem;font-size:.9rem;border-top:1px solid rgba(245,158,11,.08)}
        tr:hover td{background:rgba(245,158,11,.03)}
        .badge-s{padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:600}
        .badge-open{background:rgba(239,68,68,.15);color:#FCA5A5}
        .badge-resolved{background:rgba(16,185,129,.15);color:#6EE7B7}
        .badge-high{background:rgba(239,68,68,.2);color:#F87171}
        .badge-medium{background:rgba(245,158,11,.15);color:#FBBF24}
        .badge-low{background:rgba(59,130,246,.15);color:#60A5FA}
        .btn-resolve{padding:.3rem .8rem;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6EE7B7;border-radius:6px;font-size:.8rem;font-weight:600;text-decoration:none;transition:all .3s}
        .btn-resolve:hover{background:rgba(16,185,129,.25);color:#6EE7B7}
        .empty{text-align:center;padding:3rem;color:#64748B}
    </style>
</head>
<body>
    <div class="op-bar">
        <a th:href="@{/operator/dashboard}">← Dashboard</a>
        <span class="title">Incident Management</span>
        <a th:href="@{/auth/logout}">Logout</a>
    </div>
    <div class="container">
        <div class="top-row">
            <h1>⚠️ Incidents</h1>
            <a th:href="@{/operator/incidents/report}" class="btn-add">🆘 Report Incident</a>
        </div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <table th:if="${!incidents.isEmpty()}">
            <thead><tr><th>ID</th><th>Title</th><th>Train</th><th>Type</th><th>Severity</th><th>Status</th><th>Reported</th><th>Action</th></tr></thead>
            <tbody>
                <tr th:each="i : ${incidents}">
                    <td th:text="${i.id}">1</td>
                    <td th:text="${i.title}">Incident</td>
                    <td th:text="${i.train != null ? i.train.trainNumber : '—'}">—</td>
                    <td th:text="${i.type}">Type</td>
                    <td>
                        <span class="badge-s badge-high" th:if="${i.severity.name() == 'HIGH'}">HIGH</span>
                        <span class="badge-s badge-medium" th:if="${i.severity.name() == 'MEDIUM'}">MEDIUM</span>
                        <span class="badge-s badge-low" th:if="${i.severity.name() == 'LOW'}">LOW</span>
                    </td>
                    <td>
                        <span class="badge-s badge-open" th:if="${i.incidentStatus.name() == 'OPEN'}">OPEN</span>
                        <span class="badge-s badge-resolved" th:if="${i.incidentStatus.name() == 'RESOLVED'}">RESOLVED</span>
                    </td>
                    <td th:text="${i.createdAt != null ? #temporals.format(i.createdAt, 'dd MMM HH:mm') : '—'}">—</td>
                    <td>
                        <a th:if="${i.incidentStatus.name() == 'OPEN'}"
                           th:href="@{'/operator/incidents/' + ${i.id} + '/resolve'}" class="btn-resolve">Resolve</a>
                        <span th:if="${i.incidentStatus.name() == 'RESOLVED'}" style="color:#6EE7B7;font-size:.8rem">✓ Done</span>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${incidents.isEmpty()}" class="empty">No incidents reported.</div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
