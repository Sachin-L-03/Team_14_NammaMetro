<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Schedules — Namma Metro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body{background:#0F0F1A;font-family:'Inter',sans-serif;color:#E2E8F0;margin:0}
        .bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(26,26,46,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(124,58,237,.2)}
        .bar a{color:#A78BFA;text-decoration:none;font-weight:600;font-size:.9rem}
        .bar .title{font-size:1.1rem;font-weight:700;color:#F8FAFC}
        .container{max-width:1000px;margin:0 auto;padding:2.5rem 2rem}
        h1{font-size:1.5rem;font-weight:700;color:#F8FAFC;margin-bottom:.5rem}
        .subtitle{color:#94A3B8;margin-bottom:2rem;font-size:.9rem}
        .filter-row{display:flex;gap:1rem;align-items:end;margin-bottom:2rem;flex-wrap:wrap}
        .form-group{min-width:200px}
        .form-label{display:block;font-size:.8rem;font-weight:500;color:#94A3B8;margin-bottom:.3rem}
        .form-select{width:100%;padding:.6rem .85rem;background:rgba(15,15,26,.6);border:1px solid rgba(124,58,237,.2);border-radius:8px;color:#E2E8F0;font-size:.85rem;font-family:'Inter',sans-serif;outline:none}
        .form-select:focus{border-color:#7C3AED}
        .form-select option{background:#1A1A2E;color:#E2E8F0}
        .btn-filter{padding:.6rem 1.5rem;background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
        .btn-reset{padding:.6rem 1.2rem;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.25);color:#CBD5E1;border-radius:8px;font-size:.85rem;font-weight:600;text-decoration:none;font-family:'Inter',sans-serif}
        table{width:100%;border-collapse:collapse;background:#1A1A2E;border-radius:12px;overflow:hidden}
        thead{background:rgba(124,58,237,.08)}
        th{padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:600;color:#94A3B8;text-transform:uppercase}
        td{padding:.65rem 1rem;font-size:.85rem;border-top:1px solid rgba(124,58,237,.06)}
        tr:hover td{background:rgba(124,58,237,.03)}
        .badge-s{padding:.15rem .45rem;border-radius:5px;font-size:.7rem;font-weight:600}
        .badge-active{background:rgba(16,185,129,.15);color:#6EE7B7}
        .badge-cancelled{background:rgba(239,68,68,.15);color:#FCA5A5}
        .badge-completed{background:rgba(100,116,139,.2);color:#94A3B8}
        .empty{text-align:center;padding:3rem;color:#64748B}
        .public-badge{display:inline-block;padding:.2rem .6rem;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6EE7B7;border-radius:20px;font-size:.7rem;font-weight:600;margin-left:.5rem}
    </style>
</head>
<body>
    <div class="bar">
        <a href="/">← Home</a>
        <span class="title">🕐 Train Schedules</span>
        <a th:href="@{/auth/login}">Login</a>
    </div>
    <div class="container">
        <h1>🕐 Train Schedules <span class="public-badge">Public</span></h1>
        <p class="subtitle">View all metro train schedules. No login required.</p>

        <form th:action="@{/schedules/public}" method="get">
            <div class="filter-row">
                <div class="form-group">
                    <label class="form-label">Filter by Route</label>
                    <select name="routeId" class="form-select">
                        <option value="">All Routes</option>
                        <option th:each="r : ${routes}" th:value="${r.id}" th:text="${r.name}"
                                th:selected="${selectedRouteId != null && selectedRouteId == r.id}">Route</option>
                    </select>
                </div>
                <button type="submit" class="btn-filter">Filter</button>
                <a th:href="@{/schedules/public}" class="btn-reset">Reset</a>
            </div>
        </form>

        <table th:if="${schedules != null && !schedules.isEmpty()}">
            <thead>
                <tr><th>Train</th><th>Station</th><th>Arrival</th><th>Departure</th><th>Date</th><th>Day</th><th>Status</th></tr>
            </thead>
            <tbody>
                <tr th:each="s : ${schedules}">
                    <td th:text="${s.train != null ? s.train.trainNumber : '—'}">NM001</td>
                    <td th:text="${s.station != null ? s.station.name : '—'}">Station</td>
                    <td th:text="${s.arrivalTime != null ? s.arrivalTime : '—'}">—</td>
                    <td th:text="${s.departureTime != null ? s.departureTime : '—'}">—</td>
                    <td th:text="${s.scheduleDate != null ? s.scheduleDate : '—'}">—</td>
                    <td th:text="${s.dayOfWeek != null ? s.dayOfWeek : '—'}">—</td>
                    <td>
                        <span class="badge-s badge-active" th:if="${s.scheduleStatus != null && s.scheduleStatus.name() == 'ACTIVE'}">Active</span>
                        <span class="badge-s badge-cancelled" th:if="${s.scheduleStatus != null && s.scheduleStatus.name() == 'CANCELLED'}">Cancelled</span>
                        <span class="badge-s badge-completed" th:if="${s.scheduleStatus != null && s.scheduleStatus.name() == 'COMPLETED'}">Completed</span>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${schedules == null || schedules.isEmpty()}" class="empty">No schedules found. Select a route or check back later.</div>
    </div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
